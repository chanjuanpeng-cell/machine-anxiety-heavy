<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Anxiety - Final Edition (Fluid + Audio + AutoRotate)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; color: #ffffff; font-family: monospace; }
        @keyframes pulse { 0% { color: #222; } 50% { color: #888; text-shadow: 0 0 10px rgba(255,255,255,0.2); } 100% { color: #222; } }
        #ui-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.42); padding: 15px 25px; border: none; width: 360px; z-index: 10; display: none; backdrop-filter: blur(2px); }
        .data-row { display: grid; grid-template-columns: 150px 1fr; align-items: baseline; margin: 6px 0; font-size: 12px; letter-spacing: 0.5px; }
        .label { color: #666; text-transform: uppercase; }
        .value { color: #cfcfcf; font-weight: normal; text-align: left; }
        #display-date { font-size: 12px; color: #cfcfcf; letter-spacing: 0.5px; } 
        .warning { color: #f0f0f0; font-weight: bold; letter-spacing: 0.8px; animation: none; }
        #intro-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            cursor: pointer;
            transition: opacity 900ms ease;
        }
        #intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .intro-text {
            text-align: center;
            max-width: 720px;
            padding: 0 28px;
        }
        .intro-title {
            font-size: clamp(24px, 3vw, 42px);
            letter-spacing: 3px;
            font-weight: normal;
        }
        .intro-subtitle {
            margin-top: 16px;
            color: #8a8a8a;
            font-size: clamp(11px, 1.2vw, 15px);
            letter-spacing: 0.8px;
            line-height: 1.6;
        }
        .intro-enter {
            margin-top: 32px;
            color: #5f5f5f;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        #load-status {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 12;
            color: #777;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
        }
        #load-status.error {
            color: #cfcfcf;
        }
        #export-status {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 12;
            color: #8a8a8a;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            display: none;
        }
        #debug-panel {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 30;
            width: 300px;
            max-height: calc(100vh - 36px);
            overflow: auto;
            background: rgba(0, 0, 0, 0.72);
            color: #cfcfcf;
            padding: 14px;
            box-sizing: border-box;
            font-size: 11px;
            letter-spacing: 0.2px;
            backdrop-filter: blur(6px);
            display: none;
        }
        #debug-panel.visible { display: block; }
        #debug-panel h2 {
            margin: 0 0 10px;
            font-size: 11px;
            font-weight: normal;
            color: #f0f0f0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .debug-row {
            display: grid;
            grid-template-columns: 94px 1fr 42px;
            gap: 8px;
            align-items: center;
            margin: 7px 0;
        }
        .debug-row label { color: #8a8a8a; }
        .debug-row input { width: 100%; }
        .debug-value { color: #f0f0f0; text-align: right; }
        .debug-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 12px;
        }
        .debug-actions button {
            background: #171717;
            color: #cfcfcf;
            border: 1px solid #333;
            font: inherit;
            padding: 7px 6px;
            cursor: pointer;
        }
        #debug-output {
            margin-top: 12px;
            width: 100%;
            min-height: 120px;
            box-sizing: border-box;
            background: #050505;
            color: #d7d7d7;
            border: 1px solid #262626;
            font: 10px monospace;
            padding: 8px;
            resize: vertical;
            display: none;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">
            <div class="intro-title">MACHINE ANXIETY</div>
            <div class="intro-subtitle">A private interior destabilised by historical GBP/CNY exchange-rate fluctuations</div>
            <div class="intro-enter">Click to enter</div>
        </div>
    </div>

    <div id="ui-container">
        <div class="data-row"><span class="label">date</span><span id="display-date" class="value">SYSTEM STANDBY</span></div>
        <div class="data-row"><span class="label">GBP/CNY</span><span id="display-rate" class="value">--</span></div>
        <div class="data-row"><span class="label">spatial condition</span><span id="display-stress" class="value">--</span></div>
    </div>
    <div id="load-status">LOADING ROOM SCAN</div>
    <div id="export-status"></div>
    <div id="debug-panel">
        <h2>Debug Controls</h2>
        <div id="debug-controls"></div>
        <div class="debug-actions">
            <button id="debug-side">Side View</button>
            <button id="debug-overhead">Overhead</button>
            <button id="debug-capture">Capture View</button>
            <button id="debug-lock">Lock View</button>
            <button id="debug-pause">Pause</button>
            <button id="debug-copy">Copy Values</button>
            <button id="debug-hide">Hide</button>
        </div>
        <textarea id="debug-output" readonly></textarea>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';

        // === 离线渲染全局变量 ===
        let capturer = null;
        let isExportMode = false;
        let exportFrameCount = 0;
        let virtualTime = 0; 

        // === 完整的音频系统变量 ===
        let audioCtx, oscillator, gainNode, filterNode, machinePanner, compressorNode, masterOutput;
        let roomNoiseSource, roomNoiseGain, roomFilter, roomPanner;
        let eventNoiseSource, eventNoiseGain, eventFilter, eventPanner;
        let subOscillator, subGainNode;
        let airNoiseSource, airNoiseGain, airFilter, airPanner;
        let criticalEventCooldown = 0;
        let currentSoundMapping = { anxiety: 0, deviation: 0, velocity: 0, shock: 0, movement: 0 };
        let isAudioInitialized = false;

        let systemStarted = false;
        let motionPaused = false;
        let playbackPaused = false;
        let lastFrameTime = performance.now();
        const TITLE_HOLD_MS = 2200;
        const TITLE_FADE_MS = 1400;
        let titleSequenceStart = 0;

        const SYSTEM_CONFIG = {
            model: {
                label: 'DORM SCAN',
                path: 'models/scaniverse_dorm_bbox_clean_500k.ply',
                pointSize: 0.0088,
                pointOpacity: 0.92,
                pointColor: 0xffffff,
                useVertexColors: true,
                axisRemap: 'scaniverseRoom',
                viewMode: 'ceilingErasure',
                crop: { enabled: false },
                ceilingErasure: {
                    enabled: true,
                    startAnxiety: 0.30,
                    fullAnxiety: 0.62,
                    overheadStartAnxiety: 0.52,
                    overheadFullAnxiety: 0.86,
                    heightStart: 1.62,
                    heightFull: 0.92,
                    ceilingDrift: 10.5,
                    roomDeformBoost: 0.065
                },
                alphaTest: 0.08,
                startCamera: new THREE.Vector3(-4.15, 0.72, 2.45),
                startTarget: new THREE.Vector3(0.25, 0.34, 0.08),
                overheadCamera: new THREE.Vector3(0.12, 4.85, 0.72),
                overheadTarget: new THREE.Vector3(0.22, -0.08, 0.02),
                pressureOrigin: new THREE.Vector3(0.75, 0.2, 1.0),
                pressureRadius: 3.9
            },
            data: {
                path: 'chronicle_data.json'
            },
            export: {
                sequenceWidth: 2880,
                sequenceHeight: 1620,
                sequenceFrames: 3600,
                sequenceFramerate: 60,
                sequenceName: 'Machine_Anxiety_FinalFlow_HQ',
                stillWidth: 3840,
                stillHeight: 2160,
                stillName: 'Machine_Anxiety_Still'
            }
        };

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.04); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.2, 4.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        function drawCinematicTitleOverlay(ctx, width, height, nowMs) {
            if (!titleSequenceStart) return 1;
            const elapsed = nowMs - titleSequenceStart;
            if (elapsed >= TITLE_HOLD_MS + TITLE_FADE_MS) return;
            const alpha = elapsed <= TITLE_HOLD_MS ? 1 : 1 - ((elapsed - TITLE_HOLD_MS) / TITLE_FADE_MS);
            if (alpha <= 0.001) return;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            const pulse = 0.82 + 0.18 * (0.5 + 0.5 * Math.sin(nowMs * 0.0022));
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = `rgba(242,242,242,${pulse})`;
            ctx.font = `${Math.round(width * 0.028)}px monospace`;
            ctx.fillText('MACHINE ANXIETY', width * 0.5, height * 0.47);

            ctx.fillStyle = `rgba(189,189,189,${0.92 * pulse})`;
            ctx.font = `${Math.round(width * 0.014)}px monospace`;
            ctx.fillText('A private interior destabilised by', width * 0.5, height * 0.535);
            ctx.fillText('GBP/CNY exchange-rate fluctuations', width * 0.5, height * 0.575);
            ctx.restore();
        }

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0); 
        // 🚨【关键修改1】调整自转速度为经典数值
        controls.autoRotateSpeed = -1.25;

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.28, 0.78);
        composer.addPass(bloomPass);
        const rgbShiftPass = new ShaderPass(RGBShiftShader);
        rgbShiftPass.uniforms['amount'].value = 0.0002; 
        composer.addPass(rgbShiftPass);

        const PUSH_START_CAMERA = SYSTEM_CONFIG.model.startCamera;
        const PUSH_START_TARGET = SYSTEM_CONFIG.model.startTarget;
        let shotStartTime = 0;

        const circleCanvas = document.createElement('canvas'); circleCanvas.width = 32; circleCanvas.height = 32;
        const context = circleCanvas.getContext('2d'); context.beginPath(); context.arc(16, 16, 14, 0, Math.PI * 2); context.fillStyle = "white"; context.fill();
        const circleTexture = new THREE.CanvasTexture(circleCanvas);

        const loadStatus = document.getElementById('load-status');

        function setLoadStatus(message, isError = false) {
            if (!loadStatus) return;
            loadStatus.textContent = message;
            loadStatus.classList.toggle('error', isError);
            loadStatus.style.display = message ? 'block' : 'none';
        }

        let isRoomLoaded = false;
        let isDataLoaded = false;

        function updateLoadStatus() {
            if (isRoomLoaded && isDataLoaded) setLoadStatus('');
            else if (!isRoomLoaded) setLoadStatus(`LOADING ${SYSTEM_CONFIG.model.label}`);
            else setLoadStatus('LOADING EXCHANGE DATA');
        }

        let points;

        function applyModelStartView() {
            camera.position.copy(SYSTEM_CONFIG.model.startCamera);
            controls.target.copy(SYSTEM_CONFIG.model.startTarget);
            controls.update();
        }

        function remapScaniverseRoomAxes(geometry) {
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const sourceX = positions.getX(i);
                const sourceY = positions.getY(i);
                const sourceZ = positions.getZ(i);
                positions.setXYZ(i, sourceX, sourceZ, -sourceY);
            }
            positions.needsUpdate = true;
            geometry.computeBoundingBox();
        }

        function cropPointCloudGeometry(geometry, cropConfig) {
            if (!cropConfig || !cropConfig.enabled) return geometry;

            const positions = geometry.attributes.position;
            const colors = geometry.attributes.color;
            const keptPositions = [];
            const keptColors = [];

            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = positions.getZ(i);
                if (cropConfig.minX !== undefined && x < cropConfig.minX) continue;
                if (cropConfig.maxX !== undefined && x > cropConfig.maxX) continue;
                if (cropConfig.minY !== undefined && y < cropConfig.minY) continue;
                if (cropConfig.maxY !== undefined && y > cropConfig.maxY) continue;
                if (cropConfig.minZ !== undefined && z < cropConfig.minZ) continue;
                if (cropConfig.maxZ !== undefined && z > cropConfig.maxZ) continue;

                keptPositions.push(x, y, z);
                if (colors) keptColors.push(colors.getX(i), colors.getY(i), colors.getZ(i));
            }

            const cropped = new THREE.BufferGeometry();
            cropped.setAttribute('position', new THREE.BufferAttribute(new Float32Array(keptPositions), 3));
            if (colors) cropped.setAttribute('color', new THREE.BufferAttribute(new Float32Array(keptColors), 3));
            cropped.computeBoundingBox();
            return cropped;
        }

        function loadPointCloudModel(modelConfig) {
            new PLYLoader().load(modelConfig.path, function (geometry) {
                if (modelConfig.axisRemap === 'scaniverseRoom') remapScaniverseRoomAxes(geometry);
                geometry = cropPointCloudGeometry(geometry, modelConfig.crop);
                const basePositions = new Float32Array(geometry.attributes.position.array);
                geometry.setAttribute('basePosition', new THREE.BufferAttribute(basePositions, 3));

                const material = new THREE.PointsMaterial({
                    color: modelConfig.pointColor,
                    size: modelConfig.pointSize,
                    map: circleTexture,
                    alphaTest: modelConfig.alphaTest,
                    transparent: true,
                    opacity: modelConfig.pointOpacity,
                    vertexColors: modelConfig.useVertexColors,
                    depthWrite: false
                });
                points = new THREE.Points(geometry, material);
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                points.position.set(-center.x, -center.y, -center.z);
                scene.add(points);
                applyModelStartView();
                isRoomLoaded = true;
                updateLoadStatus();
            }, undefined, function () {
                setLoadStatus(`${modelConfig.label} FAILED TO LOAD`, true);
            });
        }

        loadPointCloudModel(SYSTEM_CONFIG.model);

        let exchangeData = [];
        let currentDayIndex = 0;
        let lastDayChangeTime = 0;
        let dayDuration = 1600; 
        let targetAnxiety = 0;
        let currentAnxiety = 0;
        let deformationDrive = 0;
        let targetDeformationDrive = 0;
        let deformationImpulse = 0;
        let previousRateForDeformation = null;
        
        // Data-mapping v2:
        // Anxiety is driven by deviation, velocity, and shock rather than rate height alone.
        const BASELINE_RATE = 9.00;
        const RATE_RANGE_FOR_DEVIATION = 0.72;
        const RATE_RANGE_FOR_VELOCITY = 0.32;
        const SHOCK_THRESHOLD = 0.18;
        const DEVIATION_WEIGHT = 0.62;
        const VELOCITY_WEIGHT = 0.30;
        const SHOCK_WEIGHT = 0.26;
        const PRESSURE_ORIGIN = SYSTEM_CONFIG.model.pressureOrigin;
        const PRESSURE_RADIUS = SYSTEM_CONFIG.model.pressureRadius;
        const RECOGNITION_HOLD_ANXIETY = 0.18;
        const SYSTEM_DELAY_MS = 2500;
        const SHORT_HOLD_MS = 400;     
        const FINAL_HOLD_MS = 3000;    
        const END_FADE_DURATION_MS = 3500;
        const BASE_FOG_DENSITY = 0.04;

        // === Cinematic cycle control ===
        // One full data cycle = one complete 360-degree orbit.
        // The final phase keeps the same viewing angle but slowly pulls the room away.
        const CYCLE_DURATION_MS = 52000;
        const END_PULL_START = 0.74;
        const LOOP_FADE_START = 0.90;
        const LOOP_RESET_AT = 0.995;
        const START_DISTANCE = 4.65;
        const MIN_VIEW_DISTANCE = 2.65;
        const END_DISTANCE = 5.75;
        const END_SIDE_OFFSET = 0.75;
        const END_VERTICAL_OFFSET = 0.18;
        const BREATH_AMOUNT = 0.06;
        const DATA_PUSH_AMOUNT = 0.42;
        const DATA_PULL_AMOUNT = 0.32;
        const START_ORBIT_ANGLE = Math.atan2(PUSH_START_CAMERA.x - PUSH_START_TARGET.x, PUSH_START_CAMERA.z - PUSH_START_TARGET.z);
        const START_CAMERA_HEIGHT = PUSH_START_CAMERA.y;
        let cinematicDataPush = 0;
        let dataDistancePulse = 0;
        let targetDataDistancePulse = 0;
        let previousRateForCamera = null;
        let pointFrameSkip = 0;
        const POINT_UPDATE_INTERVAL = 1;
        const SMOOTHED_CAMERA_POSITION = new THREE.Vector3();
        const SMOOTHED_CAMERA_TARGET = new THREE.Vector3();
        let cameraSmoothingReady = false;

        function getDayDurationForAnxiety(a) {
            if (a > 0.8) return 2100;
            if (a > 0.6) return 1600;
            if (a > 0.3) return 1100;
            return 700;
        }

        function easeInOutSine(t) {
            return -(Math.cos(Math.PI * THREE.MathUtils.clamp(t, 0, 1)) - 1) / 2;
        }

        function getCycleProgress(now) {
            if (!systemStarted || !shotStartTime) return 0;
            const elapsed = Math.max(0, now - shotStartTime - SYSTEM_DELAY_MS);
            return THREE.MathUtils.clamp(elapsed / CYCLE_DURATION_MS, 0, 1);
        }

        function restartCycle(now) {
            currentDayIndex = 0;
            lastDayChangeTime = now;
            shotStartTime = now;
            targetAnxiety = 0;
            currentAnxiety = 0;
            deformationDrive = 0;
            targetDeformationDrive = 0;
            deformationImpulse = 0;
            cinematicDataPush = 0;
            dataDistancePulse = 0;
            targetDataDistancePulse = 0;
            previousRateForCamera = null;
            previousRateForDeformation = null;
            pointFrameSkip = 0;
            cameraSmoothingReady = false;

            if (points && points.geometry && points.geometry.attributes.basePosition) {
                const positions = points.geometry.attributes.position;
                const bases = points.geometry.attributes.basePosition;
                for (let i = 0; i < positions.count; i++) {
                    positions.setXYZ(i, bases.getX(i), bases.getY(i), bases.getZ(i));
                }
                positions.needsUpdate = true;
            }

            if (points && points.material) {
                points.material.opacity = SYSTEM_CONFIG.model.pointOpacity;
                points.material.size = SYSTEM_CONFIG.model.pointSize;
            }

            if (bloomPass) bloomPass.strength = 0.45;
            if (rgbShiftPass && rgbShiftPass.uniforms && rgbShiftPass.uniforms['amount']) rgbShiftPass.uniforms['amount'].value = 0.0002;
            if (scene && scene.fog) scene.fog.density = 0.04;
        }

        function getDataIndexFromProgress(progress) {
            if (!exchangeData.length) return 0;
            return Math.min(exchangeData.length - 1, Math.floor(progress * exchangeData.length));
        }

        function getMappedAnxiety(index) {
            if (!exchangeData.length) return { anxiety: 0, deviation: 0, velocity: 0, shock: 0, movement: 0 };

            const activeData = exchangeData[index];
            const previousData = exchangeData[Math.max(0, index - 1)];
            const movement = Math.abs(activeData.rate - previousData.rate);

            const deviation = THREE.MathUtils.clamp(Math.abs(activeData.rate - BASELINE_RATE) / RATE_RANGE_FOR_DEVIATION, 0, 1);
            const velocity = THREE.MathUtils.clamp(movement / RATE_RANGE_FOR_VELOCITY, 0, 1);
            const shock = THREE.MathUtils.clamp((movement - SHOCK_THRESHOLD) / RATE_RANGE_FOR_VELOCITY, 0, 1);
            const anxiety = THREE.MathUtils.clamp(
                deviation * DEVIATION_WEIGHT + velocity * VELOCITY_WEIGHT + shock * SHOCK_WEIGHT,
                0,
                1
            );

            return { anxiety, deviation, velocity, shock, movement };
        }

        const uiDate = document.getElementById('display-date');
        const uiRate = document.getElementById('display-rate');
        const uiStress = document.getElementById('display-stress');

        fetch(SYSTEM_CONFIG.data.path)
            .then(response => {
                if (!response.ok) throw new Error('Exchange data request failed');
                return response.json();
            })
            .then(data => {
                exchangeData = data;
                isDataLoaded = true;
                updateLoadStatus();
            })
            .catch(() => {
                setLoadStatus('EXCHANGE DATA FAILED TO LOAD', true);
            });

        function resetSystemState() {
            currentDayIndex = 0;
            lastDayChangeTime = virtualTime || Date.now();
            shotStartTime = lastDayChangeTime;
            dayDuration = 1600;
            targetAnxiety = 0; currentAnxiety = 0;
            deformationDrive = 0;
            targetDeformationDrive = 0;
            deformationImpulse = 0;
            cinematicDataPush = 0;
            dataDistancePulse = 0;
            targetDataDistancePulse = 0;
            previousRateForCamera = null;
            previousRateForDeformation = null;
            currentSoundMapping = { anxiety: 0, deviation: 0, velocity: 0, shock: 0, movement: 0 };
            pointFrameSkip = 0;
            cameraSmoothingReady = false;
            titleSequenceStart = virtualTime || Date.now();
            camera.position.copy(PUSH_START_CAMERA);
            controls.target.copy(PUSH_START_TARGET);
            // Restore classic auto-rotate state and speed
            controls.autoRotate = true;
            controls.autoRotateSpeed = -1.25;
        }

        function startSystem() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!isAudioInitialized) {
                masterOutput = audioCtx.createGain();
                masterOutput.gain.value = 0.82;
                compressorNode = audioCtx.createDynamicsCompressor();
                compressorNode.threshold.value = -18;
                compressorNode.knee.value = 24;
                compressorNode.ratio.value = 8;
                compressorNode.attack.value = 0.006;
                compressorNode.release.value = 0.28;
                compressorNode.connect(masterOutput);
                masterOutput.connect(audioCtx.destination);

                oscillator = audioCtx.createOscillator();
                oscillator.type = 'sawtooth';
                subOscillator = audioCtx.createOscillator();
                subOscillator.type = 'sine';

                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0;
                machinePanner = audioCtx.createStereoPanner();
                machinePanner.pan.value = 0;

                subGainNode = audioCtx.createGain();
                subGainNode.gain.value = 0;
                
                oscillator.connect(filterNode);
                filterNode.connect(gainNode);
                gainNode.connect(machinePanner);
                machinePanner.connect(compressorNode);
                subOscillator.connect(subGainNode);
                subGainNode.connect(machinePanner);

                // room ambient noise layer
                const roomNoiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const roomNoiseData = roomNoiseBuffer.getChannelData(0);
                for (let i = 0; i < roomNoiseData.length; i++) { roomNoiseData[i] = (Math.random() * 2 - 1) * 0.03; }
                roomNoiseSource = audioCtx.createBufferSource();
                roomNoiseSource.buffer = roomNoiseBuffer; roomNoiseSource.loop = true;
                roomNoiseGain = audioCtx.createGain(); roomNoiseGain.gain.value = 0.014;
                roomFilter = audioCtx.createBiquadFilter(); roomFilter.type = 'bandpass'; roomFilter.frequency.value = 420; roomFilter.Q.value = 0.8;
                roomPanner = audioCtx.createStereoPanner(); roomPanner.pan.value = 0;
                roomNoiseSource.connect(roomFilter); roomFilter.connect(roomNoiseGain); roomNoiseGain.connect(roomPanner); roomPanner.connect(compressorNode);
                roomNoiseSource.start();

                // critical-event noise layer
                const eventNoiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1, audioCtx.sampleRate);
                const eventNoiseData = eventNoiseBuffer.getChannelData(0);
                for (let i = 0; i < eventNoiseData.length; i++) { eventNoiseData[i] = (Math.random() * 2 - 1) * 0.08; }
                eventNoiseSource = audioCtx.createBufferSource(); eventNoiseSource.buffer = eventNoiseBuffer; eventNoiseSource.loop = true;
                eventFilter = audioCtx.createBiquadFilter(); eventFilter.type = 'bandpass'; eventFilter.frequency.value = 1800; eventFilter.Q.value = 1.2;
                eventNoiseGain = audioCtx.createGain(); eventNoiseGain.gain.value = 0;
                eventPanner = audioCtx.createStereoPanner(); eventPanner.pan.value = 0;
                eventNoiseSource.connect(eventFilter); eventFilter.connect(eventNoiseGain); eventNoiseGain.connect(eventPanner); eventPanner.connect(compressorNode);
                eventNoiseSource.start();

                // airy room layer
                const airNoiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const airNoiseData = airNoiseBuffer.getChannelData(0);
                for (let i = 0; i < airNoiseData.length; i++) { airNoiseData[i] = (Math.random() * 2 - 1) * 0.02; }
                airNoiseSource = audioCtx.createBufferSource(); airNoiseSource.buffer = airNoiseBuffer; airNoiseSource.loop = true;
                airFilter = audioCtx.createBiquadFilter(); airFilter.type = 'highpass'; airFilter.frequency.value = 1800;
                airNoiseGain = audioCtx.createGain(); airNoiseGain.gain.value = 0.0;
                airPanner = audioCtx.createStereoPanner(); airPanner.pan.value = 0;
                airNoiseSource.connect(airFilter); airFilter.connect(airNoiseGain); airNoiseGain.connect(airPanner); airPanner.connect(compressorNode);
                airNoiseSource.start();
                
                oscillator.start();
                subOscillator.start();
                isAudioInitialized = true;
            }

            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            resetSystemState();
            systemStarted = true;

        }

        function animate() {
            requestAnimationFrame(animate);

            if (isExportMode) {
                virtualTime += (1000 / 60);
            } else if (!playbackPaused) {
                virtualTime = Date.now();
            }
            const now = virtualTime;
            const dtSec = isExportMode ? (1/60) : Math.min(0.05, (performance.now() - lastFrameTime) / 1000);
            lastFrameTime = performance.now();
            // ==========================================
            // 🎬 Classic orbit-controls camera relation restored
            // ==========================================
            // The older version felt better because OrbitControls handled the angle,
            // while anxiety only changed the camera distance along the same viewing line.
            // This keeps the camera-model relationship more physical and less mechanical.

            // Classic breathing dolly: distant view at rest, closer view under pressure.
            const cycleProgress = getCycleProgress(now);
            if (systemStarted && cycleProgress >= LOOP_RESET_AT) {
                restartCycle(now);
            }
            const activeCycleProgress = getCycleProgress(now);
            const endPullProgress = activeCycleProgress <= END_PULL_START
                ? 0
                : easeInOutSine(THREE.MathUtils.clamp((activeCycleProgress - END_PULL_START) / (LOOP_RESET_AT - END_PULL_START), 0, 1));
            const loopFadeProgress = activeCycleProgress <= LOOP_FADE_START
                ? 0
                : easeInOutSine(THREE.MathUtils.clamp((activeCycleProgress - LOOP_FADE_START) / (LOOP_RESET_AT - LOOP_FADE_START), 0, 1));
            const debugAnxiety = DEBUG_STATE.previewAnxiety >= 0 ? DEBUG_STATE.previewAnxiety : currentAnxiety;

            // Camera-model relationship restored from the simulated-data version.
            // The camera keeps orbiting around a stable target, while anxiety pushes the view closer.
            const breathDrift = Math.sin(now * 0.0005) * 0.6;
            const anxietyPush = currentAnxiety * 2.3;
            const isCeilingErasureView = SYSTEM_CONFIG.model.viewMode === 'ceilingErasure';
            if (isCeilingErasureView) {
                const erasureConfig = SYSTEM_CONFIG.model.ceilingErasure;
                const overheadBlend = easeInOutSine(THREE.MathUtils.clamp((debugAnxiety - erasureConfig.overheadStartAnxiety) / (erasureConfig.overheadFullAnxiety - erasureConfig.overheadStartAnxiety), 0, 1));
                const breath = Math.sin(now * 0.00032) * 0.045;
                const orbitAngle = START_ORBIT_ANGLE - 1.05 + now * 0.000045;
                const externalCamera = new THREE.Vector3(
                    PUSH_START_TARGET.x + Math.sin(orbitAngle) * 4.75,
                    PUSH_START_CAMERA.y + breath,
                    PUSH_START_TARGET.z + Math.cos(orbitAngle) * 4.75
                );
                if (!DEBUG_STATE.manualCamera) {
                    camera.position.lerpVectors(externalCamera, SYSTEM_CONFIG.model.overheadCamera, overheadBlend);
                    controls.target.lerpVectors(PUSH_START_TARGET, SYSTEM_CONFIG.model.overheadTarget, overheadBlend);
                }
                controls.autoRotate = false;
                controls.update();
            } else {
                const targetDistance = 4.8 - anxietyPush + breathDrift;
                const offset = camera.position.clone().sub(controls.target);
                if (offset.length() > 0.1) {
                    const currentDist = offset.length();
                    const newDist = currentDist + (targetDistance - currentDist) * 0.02;
                    offset.setLength(Math.max(MIN_VIEW_DISTANCE, newDist));
                    camera.position.copy(controls.target.clone().add(offset));
                }

                controls.target.lerp(PUSH_START_TARGET, 0.035);
                controls.autoRotate = true;
                controls.autoRotateSpeed = -1.25 - (currentAnxiety * 4.0);
                controls.update();
            }

            if (systemStarted && exchangeData.length > 0) {
                const systemElapsed = shotStartTime ? (now - shotStartTime) : 0;

                if (!playbackPaused && systemElapsed >= SYSTEM_DELAY_MS) {
                    const progressIndex = getDataIndexFromProgress(activeCycleProgress);
                    if (progressIndex !== currentDayIndex) {
                        currentDayIndex = progressIndex;
                        lastDayChangeTime = now;
                    }

                    const mappedData = getMappedAnxiety(currentDayIndex);
                    targetAnxiety = mappedData.anxiety;
                    currentSoundMapping = mappedData;

                    // Volatility and shock add sharper pressure changes on top of the continuous anxiety field.
                    targetDataDistancePulse = THREE.MathUtils.clamp(
                        mappedData.movement * 1.45 + mappedData.velocity * 0.10 + mappedData.shock * 0.18,
                        0,
                        0.32
                    );
                    previousRateForDeformation = exchangeData[currentDayIndex].rate;

                    // Keep the real-data anxiety signal visually strong through the full cycle.
                    // The simulated-data version felt stronger because it did not damp the model before the ending.
                }

                const displayData = exchangeData[currentDayIndex];
                uiDate.innerText = displayData.date;
                uiRate.innerText = "£1 = ¥" + displayData.rate.toFixed(2);
            }

            if (!motionPaused) {
                currentAnxiety += (targetAnxiety - currentAnxiety) * (targetAnxiety > currentAnxiety ? 0.03 : 0.01);
            }

            if (currentAnxiety > 0.8) uiStress.innerHTML = `<span class="warning">COMPROMISED</span>`;
            else if (currentAnxiety > 0.6) uiStress.innerText = "UNSTABLE";
            else if (currentAnxiety > 0.2) uiStress.innerText = "REDUCED";
            else uiStress.innerText = "NOMINAL";

            // 🚨【关键修改4】彻底删除了原有的 "camera.position.lerpVectors" 强制锁死推进代码
            // 现在摄影机的移动权力 100% 交还给了自转控制器 OrbitControls

            const glitchMax = 0.002;
            const a = Math.max(0, Math.min(1, currentAnxiety));
            let endFade = 0;
            if (systemStarted && exchangeData.length > 0) {
                // Lighter ending fade: keeps the point-cloud body present and less washed out.
                endFade = loopFadeProgress;
            }

            if (isAudioInitialized && !motionPaused && !isExportMode) {
                const fadeGain = 1 - endFade;
                const collapseThreshold = 0.72;
                const collapseDrive = currentAnxiety > collapseThreshold ? (currentAnxiety - collapseThreshold) / (1 - collapseThreshold) : 0;
                const soundDeviation = currentSoundMapping.deviation || 0;
                const soundVelocity = currentSoundMapping.velocity || 0;
                const soundShock = currentSoundMapping.shock || 0;
                const driftPan = Math.sin(now * 0.00032) * 0.18;

                const targetVolume = (0.012 + soundDeviation * 0.036 + currentAnxiety * 0.045 + collapseDrive * 0.07) * fadeGain;
                gainNode.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.10);

                const targetFilter = (180 + soundDeviation * 420 + soundVelocity * 520 + soundShock * 700 + collapseDrive * 380) * fadeGain;
                filterNode.frequency.setTargetAtTime(targetFilter, audioCtx.currentTime, 0.10);

                const targetPitch = 36 + soundDeviation * 4 + soundVelocity * 2 + collapseDrive * 5;
                oscillator.frequency.setTargetAtTime(targetPitch, audioCtx.currentTime, 0.08);
                if (machinePanner) machinePanner.pan.setTargetAtTime(THREE.MathUtils.clamp(driftPan + soundShock * 0.16, -0.55, 0.55), audioCtx.currentTime, 0.18);

                if (subOscillator && subGainNode) {
                    const subPitch = 26 + soundDeviation * 2.5 + collapseDrive * 3.5;
                    const subVolume = (0.010 + soundDeviation * 0.026 + collapseDrive * 0.034) * fadeGain;
                    subOscillator.frequency.setTargetAtTime(subPitch, audioCtx.currentTime, 0.12);
                    subGainNode.gain.setTargetAtTime(subVolume, audioCtx.currentTime, 0.14);
                }

                const roomNoiseTarget = (0.030 + currentAnxiety * 0.020 + soundVelocity * 0.026 + collapseDrive * 0.030) * fadeGain;
                roomNoiseGain.gain.setTargetAtTime(roomNoiseTarget, audioCtx.currentTime, 0.16);
                roomFilter.frequency.setTargetAtTime(260 + soundDeviation * 260 + soundVelocity * 360, audioCtx.currentTime, 0.18);
                if (roomPanner) roomPanner.pan.setTargetAtTime(-driftPan * 0.6, audioCtx.currentTime, 0.24);

                if (airNoiseGain && airFilter) {
                    const airNoiseTarget = (soundVelocity * 0.018 + soundShock * 0.035 + collapseDrive * 0.018) * fadeGain;
                    airNoiseGain.gain.setTargetAtTime(airNoiseTarget, audioCtx.currentTime, 0.10);
                    airFilter.frequency.setTargetAtTime(1500 + soundShock * 2600 + soundVelocity * 900, audioCtx.currentTime, 0.12);
                    if (airPanner) airPanner.pan.setTargetAtTime(THREE.MathUtils.clamp(-driftPan + soundShock * 0.28, -0.75, 0.75), audioCtx.currentTime, 0.18);
                }

                const nowSec = audioCtx.currentTime;
                if ((soundShock > 0.16 || currentAnxiety > 0.82) && nowSec > criticalEventCooldown && endFade < 0.7) {
                    const burst = (0.004 + soundShock * 0.024 + collapseDrive * 0.018 + Math.random() * 0.006) * fadeGain;
                    const burstPan = THREE.MathUtils.clamp((Math.random() * 2 - 1) * 0.95, -1, 1);
                    eventFilter.frequency.setValueAtTime(650 + soundShock * 1800 + Math.random() * 900, nowSec);
                    if (eventPanner) eventPanner.pan.setValueAtTime(burstPan, nowSec);
                    eventNoiseGain.gain.cancelScheduledValues(nowSec);
                    eventNoiseGain.gain.setValueAtTime(0, nowSec);
                    eventNoiseGain.gain.linearRampToValueAtTime(burst, nowSec + 0.015);
                    eventNoiseGain.gain.exponentialRampToValueAtTime(0.0001, nowSec + 0.18 + soundShock * 0.16);
                    criticalEventCooldown = nowSec + 0.22 + Math.random() * 0.38;
                }
            }

            let glitchDrive = 0;
            if (a > 0.7) { const t = (a - 0.7) / 0.3; glitchDrive = t * t; }
            const rgbAmount = glitchMax * glitchDrive;

            // Keep the final exported JPG frames visually denser and sharper.
            bloomPass.strength = 0.45 * (1 - endFade * 0.85);
            rgbShiftPass.uniforms['amount'].value = rgbAmount * (1 - endFade * 0.7);
            scene.fog.density = 0.04 + (BASE_FOG_DENSITY * 1.4 * endFade);

            if (points && points.material) {
                const recognitionHold = 1 - THREE.MathUtils.clamp(currentAnxiety / RECOGNITION_HOLD_ANXIETY, 0, 1);
                points.material.size = (SYSTEM_CONFIG.model.pointSize + recognitionHold * 0.0012) * (1 - endFade * 0.08);
                points.material.opacity = (SYSTEM_CONFIG.model.pointOpacity + recognitionHold * 0.10) * (1 - endFade * 0.22);
            }
            pointFrameSkip = (pointFrameSkip + 1) % POINT_UPDATE_INTERVAL;
            if (points && points.geometry && points.geometry.attributes.basePosition && !motionPaused && pointFrameSkip === 0) {
                const positions = points.geometry.attributes.position;
                const bases = points.geometry.attributes.basePosition;
                const count = positions.count;
                const time = now * 0.00115;

                // Classic deformation model restored from the earlier version.
                // This is simpler and more continuous, which gives the point cloud a more natural organic movement.
                const visualStress = debugAnxiety;
                let finalInstability = visualStress <= 0.55 ? (visualStress / 0.55) * 0.0065 : 0.0065 + Math.pow((visualStress - 0.55) / 0.45, 2) * 0.095;
                const collapseDrive = visualStress > 0.72 ? (visualStress - 0.72) / 0.28 : 0;
                const pressureDrive = THREE.MathUtils.clamp((visualStress - 0.22) / 0.78, 0, 1);
                const pressurePulse = 0.78 + 0.22 * Math.sin(time * 2.4);
                const erasureConfig = SYSTEM_CONFIG.model.ceilingErasure;
                const ceilingErasure = erasureConfig && erasureConfig.enabled
                    ? easeInOutSine(THREE.MathUtils.clamp((visualStress - erasureConfig.startAnxiety) / (erasureConfig.fullAnxiety - erasureConfig.startAnxiety), 0, 1))
                    : 0;
                const ceilingCutHeight = erasureConfig
                    ? THREE.MathUtils.lerp(erasureConfig.heightStart, erasureConfig.heightFull, ceilingErasure)
                    : Infinity;
                const roomExposure = erasureConfig
                    ? easeInOutSine(THREE.MathUtils.clamp((visualStress - erasureConfig.overheadStartAnxiety) / (erasureConfig.overheadFullAnxiety - erasureConfig.overheadStartAnxiety), 0, 1))
                    : 0;

                for (let i = 0; i < count; i++) {
                    const bx = bases.getX(i), by = bases.getY(i), bz = bases.getZ(i);
                    const px = positions.getX(i), py = positions.getY(i), pz = positions.getZ(i);
                    const ceilingWeight = erasureConfig
                        ? THREE.MathUtils.clamp((by - ceilingCutHeight) / 0.55, 0, 1) * ceilingErasure
                        : 0;
                    const erasureHash = 0.5 + 0.5 * Math.sin(i * 17.371 + bx * 3.7 + bz * 2.9);

                    const dist = Math.sqrt(bx * bx + by * by + bz * bz);
                    const edgeWeight = Math.min(1, (1.0 - Math.exp(-dist * 1.45)) * 1.35);
                    const pressureDistance = Math.sqrt(
                        Math.pow(bx - PRESSURE_ORIGIN.x, 2) +
                        Math.pow(by - PRESSURE_ORIGIN.y, 2) +
                        Math.pow(bz - PRESSURE_ORIGIN.z, 2)
                    );
                    const pressureWeight = Math.pow(THREE.MathUtils.clamp(1 - pressureDistance / PRESSURE_RADIUS, 0, 1), 1.7) * pressureDrive;

                    const fieldA = Math.sin(bx * 2.9 + time * 1.20) * Math.cos(by * 2.4 + time * 0.95);
                    const fieldB = Math.cos(bz * 2.7 - time * 1.08) * Math.sin(by * 2.1 + time * 0.84);
                    const fieldC = Math.sin((bx + bz) * 2.0 + time * 0.76);
                    const scanSlice = Math.sin((bx * 5.7) + (bz * 3.2) - time * 2.15);
                    const scanBreak = pressureWeight * pressureWeight * Math.max(0, scanSlice) * pressurePulse;

                    const radialLen = Math.max(0.0001, dist);
                    const radialX = bx / radialLen, radialY = by / radialLen, radialZ = bz / radialLen;
                    const pressureLen = Math.max(0.0001, pressureDistance);
                    const pressureX = (bx - PRESSURE_ORIGIN.x) / pressureLen;
                    const pressureY = (by - PRESSURE_ORIGIN.y) / pressureLen;
                    const pressureZ = (bz - PRESSURE_ORIGIN.z) / pressureLen;

                    const baseOutward = finalInstability * edgeWeight * 1.35;
                    const baseFlow = finalInstability * (0.55 + edgeWeight * 1.05);

                    let targetX = bx + radialX * baseOutward + fieldA * baseFlow * 0.90 + fieldC * baseFlow * 0.30;
                    let targetY = by + radialY * baseOutward * 0.50 + fieldB * baseFlow * 0.40;
                    let targetZ = bz + radialZ * baseOutward + fieldB * baseFlow * 0.74 + fieldC * baseFlow * 0.26;

                    targetX += pressureX * scanBreak * 0.22 + pressureWeight * fieldA * 0.038;
                    targetY += pressureY * scanBreak * 0.075 + pressureWeight * fieldB * 0.018;
                    targetZ += pressureZ * scanBreak * 0.18 + pressureWeight * fieldC * 0.036;

                    if (ceilingWeight > erasureHash * 0.72) {
                        const lift = ceilingWeight * ceilingWeight * erasureConfig.ceilingDrift;
                        targetX += fieldA * lift * 0.035 + pressureX * lift * 0.018;
                        targetY += lift * (1.05 + erasureHash * 0.28);
                        targetZ += fieldB * lift * 0.035 + pressureZ * lift * 0.018;
                    } else if (roomExposure > 0.01) {
                        const roomInteriorWeight = THREE.MathUtils.clamp((1.45 - by) / 1.95, 0, 1) * (1 - ceilingWeight);
                        const roomShift = roomExposure * erasureConfig.roomDeformBoost * roomInteriorWeight * (0.6 + edgeWeight);
                        targetX += fieldA * roomShift * 1.35 + pressureX * roomShift * 0.55;
                        targetY += fieldB * roomShift * 0.45;
                        targetZ += fieldC * roomShift * 1.15 + pressureZ * roomShift * 0.42;
                    }

                    if (collapseDrive > 0) {
                        const isDetached = Math.abs(Math.sin(i * 91.173 + bx * 3.1 + bz * 2.7)) > (0.82 - collapseDrive * 0.34 - edgeWeight * 0.18 - pressureWeight * 0.12);
                        if (isDetached) {
                            const burst = collapseDrive * collapseDrive * (0.55 + edgeWeight * 1.35 + pressureWeight * 0.65);
                            targetX += radialX * burst * 2.2 + pressureX * burst * 0.65 + fieldA * burst * 0.8;
                            targetY += radialY * burst * 0.9 + pressureY * burst * 0.26 + fieldB * burst * 0.55;
                            targetZ += radialZ * burst * 2.0 + pressureZ * burst * 0.56 + fieldC * burst * 0.7;
                            const driftLerp = 0.085 + collapseDrive * 0.05;
                            positions.setXYZ(i, px + (targetX - px) * driftLerp, py + (targetY - py) * driftLerp, pz + (targetZ - pz) * driftLerp);
                            continue;
                        }
                    }
                    positions.setXYZ(i, px + (targetX - px) * 0.20, py + (targetY - py) * 0.20, pz + (targetZ - pz) * 0.20);
                }
                positions.needsUpdate = true;
            }

            composer.render();
            const overlayCtx = renderer.domElement.getContext('2d');
            if (overlayCtx && titleSequenceStart) drawCinematicTitleOverlay(overlayCtx, renderer.domElement.width, renderer.domElement.height, now);

            if (isExportMode && capturer) {
                capturer.capture(renderer.domElement);
                exportFrameCount++;
                const progress = Math.min(100, Math.round((exportFrameCount / SYSTEM_CONFIG.export.sequenceFrames) * 100));
                setExportStatus(`EXPORTING JPG SEQUENCE ${progress}%`);
                if (exportFrameCount > SYSTEM_CONFIG.export.sequenceFrames) finishSequenceExport();
            }
        }

        window.addEventListener('resize', () => {
            if(!isExportMode) {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            }
        });
        animate();
    </script>
</body>
</html>
