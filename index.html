        function drawCinematicTitleOverlay(ctx, width, height, nowMs) {
            if (!titleSequenceStart) return 1;
            const elapsed = nowMs - titleSequenceStart;
            if (elapsed >= TITLE_HOLD_MS + TITLE_FADE_MS) return;
            const alpha = elapsed <= TITLE_HOLD_MS ? 1 : 1 - ((elapsed - TITLE_HOLD_MS) / TITLE_FADE_MS);
            if (alpha <= 0.001) return;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            const pulse = 0.82 + 0.18 * (0.5 + 0.5 * Math.sin(nowMs * 0.0022));
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = `rgba(242,242,242,${pulse})`;
            ctx.font = `${Math.round(width * 0.028)}px monospace`;
            ctx.fillText('MACHINE ANXIETY', width * 0.5, height * 0.47);

            ctx.fillStyle = `rgba(189,189,189,${0.92 * pulse})`;
            ctx.font = `${Math.round(width * 0.014)}px monospace`;
            ctx.fillText('A private interior destabilised by', width * 0.5, height * 0.535);
            ctx.fillText('GBP/CNY exchange-rate fluctuations', width * 0.5, height * 0.575);
            ctx.restore();
        }

        function getSpatialConditionLabel() {
            if (currentAnxiety > 0.8) return 'COMPROMISED';
            if (currentAnxiety > 0.6) return 'UNSTABLE';
            if (currentAnxiety > 0.2) return 'REDUCED';
            return 'NOMINAL';
        }

        function drawExportDataPanel(ctx, width, height) {
            if (!exchangeData.length) return;
            const displayData = exchangeData[currentDayIndex] || exchangeData[0];
            const scale = width / 1920;
            const panelWidth = Math.round(360 * scale);
            const panelHeight = Math.round(94 * scale);
            const x = Math.round((width - panelWidth) / 2);
            const y = Math.round(height - panelHeight - 44 * scale);
            const padX = Math.round(26 * scale);
            const rowGap = Math.round(25 * scale);
            const labelX = x + padX;
            const valueX = x + Math.round(190 * scale);
            const firstY = y + Math.round(28 * scale);

            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.50)';
            ctx.fillRect(x, y, panelWidth, panelHeight);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.045)';
            ctx.fillRect(x, y, panelWidth, 1);
            ctx.font = `${Math.round(12 * scale)}px monospace`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';

            const rows = [
                ['DATE', displayData.date || '--'],
                ['GBP/CNY', `£1 = ¥${Number(displayData.rate || 0).toFixed(2)}`],
                ['SPATIAL CONDITION', getSpatialConditionLabel()]
            ];

            rows.forEach((row, index) => {
                const rowY = firstY + rowGap * index;
                ctx.fillStyle = 'rgba(150, 150, 150, 0.82)';
                ctx.fillText(row[0], labelX, rowY);
                ctx.fillStyle = row[1] === 'COMPROMISED' ? 'rgba(255, 82, 82, 0.95)' : 'rgba(230, 230, 230, 0.94)';
                ctx.fillText(row[1], valueX, rowY);
            });
            ctx.restore();
        }

        function composeExportFrame(drawPanel = true) {
            const source = renderer.domElement;
            if (exportCompositeCanvas.width !== source.width || exportCompositeCanvas.height !== source.height) {

                exportCompositeCanvas.height = source.height;
            }
            exportCompositeCtx.clearRect(0, 0, exportCompositeCanvas.width, exportCompositeCanvas.height);
            exportCompositeCtx.drawImage(source, 0, 0);
            drawCinematicTitleOverlay(exportCompositeCtx, exportCompositeCanvas.width, exportCompositeCanvas.height, virtualTime || Date.now());
            if (drawPanel && shouldDrawExportPanel(virtualTime || Date.now())) {
                drawExportDataPanel(exportCompositeCtx, exportCompositeCanvas.width, exportCompositeCanvas.height);
            }
            return exportCompositeCanvas;
        }

        function remapScaniverseRoomAxes(geometry) {
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const sourceX = positions.getX(i);
                const sourceY = positions.getY(i);
                const sourceZ = positions.getZ(i);
                positions.setXYZ(i, sourceX, sourceZ, -sourceY);
            }
            positions.needsUpdate = true;
            geometry.computeBoundingBox();
        }

        function cropPointCloudGeometry(geometry, cropConfig) {
            if (!cropConfig || !cropConfig.enabled) return geometry;

            const positions = geometry.attributes.position;
            const colors = geometry.attributes.color;
            const keptPositions = [];
            const keptColors = [];

            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = positions.getZ(i);
                if (cropConfig.minX !== undefined && x < cropConfig.minX) continue;
                if (cropConfig.maxX !== undefined && x > cropConfig.maxX) continue;
                if (cropConfig.minY !== undefined && y < cropConfig.minY) continue;
                if (cropConfig.maxY !== undefined && y > cropConfig.maxY) continue;
                if (cropConfig.minZ !== undefined && z < cropConfig.minZ) continue;
                if (cropConfig.maxZ !== undefined && z > cropConfig.maxZ) continue;

                keptPositions.push(x, y, z);
                if (colors) keptColors.push(colors.getX(i), colors.getY(i), colors.getZ(i));
            }

            const cropped = new THREE.BufferGeometry();
            cropped.setAttribute('position', new THREE.BufferAttribute(new Float32Array(keptPositions), 3));
            if (colors) cropped.setAttribute('color', new THREE.BufferAttribute(new Float32Array(keptColors), 3));
            cropped.computeBoundingBox();
            return cropped;
        }

        function deterministicNoise(seed) {
            const value = Math.sin(seed * 12.9898) * 43758.5453;
            return value - Math.floor(value);
        }

        function signedNoise(seed) {
            return deterministicNoise(seed) * 2 - 1;
        }

        function irregularizePointCloudGeometry(geometry, config) {
            if (!config || !config.enabled) return geometry;

            const sourcePositions = geometry.attributes.position;
            const sourceColors = geometry.attributes.color;
            const jitter = config.jitter || 0;
            const duplicateRatio = config.duplicateRatio || 0;
            const duplicateJitter = config.duplicateJitter || jitter;
            const colorVariation = config.colorVariation || 0;
            const positions = [];
            const colors = sourceColors ? [] : null;

            for (let i = 0; i < sourcePositions.count; i++) {
                const x = sourcePositions.getX(i);
                const y = sourcePositions.getY(i);
                const z = sourcePositions.getZ(i);
                const jx = signedNoise(i * 3.17 + 11.1) * jitter;
                const jy = signedNoise(i * 4.91 + 23.7) * jitter * 0.55;
                const jz = signedNoise(i * 6.43 + 41.9) * jitter;

                positions.push(x + jx, y + jy, z + jz);
                if (sourceColors) {
                    const shade = 1 + signedNoise(i * 2.73 + 8.2) * colorVariation;
                    colors.push(
                        THREE.MathUtils.clamp(sourceColors.getX(i) * shade, 0, 1),
                        THREE.MathUtils.clamp(sourceColors.getY(i) * shade, 0, 1),
                        THREE.MathUtils.clamp(sourceColors.getZ(i) * shade, 0, 1)
                    );
                }

                if (deterministicNoise(i * 9.31 + 5.4) < duplicateRatio) {
                    const dx = signedNoise(i * 7.13 + 101.2) * duplicateJitter;
                    const dy = signedNoise(i * 5.57 + 77.7) * duplicateJitter * 0.65;
                    const dz = signedNoise(i * 8.89 + 13.5) * duplicateJitter;
                    positions.push(x + dx, y + dy, z + dz);
                    if (sourceColors) {
                        const shade = 0.76 + deterministicNoise(i * 4.41 + 19.8) * 0.22;
                        colors.push(
                            THREE.MathUtils.clamp(sourceColors.getX(i) * shade, 0, 1),

            irregular.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));

        function loadPointCloudModel(modelConfig) {

                const material = new THREE.PointsMaterial({

                    alphaTest: modelConfig.alphaTest,
                    transparent: true,
                    opacity: modelConfig.pointOpacity,
                    vertexColors: modelConfig.useVertexColors,
                    depthWrite: false

                points = new THREE.Points(geometry, material);
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                points.position.set(-center.x, -center.y, -center.z);
                scene.add(points);

        const RATE_RANGE_FOR_VELOCITY = 0.32;
        const SHOCK_THRESHOLD = 0.18;
        const DEVIATION_WEIGHT = 0.62;
        const VELOCITY_WEIGHT = 0.30;
        const SHOCK_WEIGHT = 0.26;
        const SOUND_MASTER_GAIN = 1.35;
        const SOUND_LAYER_GAIN = 2.15;
        const PRESSURE_ORIGIN = SYSTEM_CONFIG.model.pressureOrigin;
        const PRESSURE_RADIUS = SYSTEM_CONFIG.model.pressureRadius;

        const DATA_PUSH_AMOUNT = 0.42;
        const DATA_PULL_AMOUNT = 0.32;

        const START_CAMERA_HEIGHT = PUSH_START_CAMERA.y;
        let cinematicDataPush = 0;
        let dataDistancePulse = 0;
        let targetDataDistancePulse = 0;
        let previousRateForCamera = null;

        function getDayDurationForAnxiety(a) {
            if (a > 0.8) return 2100;
            if (a > 0.6) return 1600;
            if (a > 0.3) return 1100;
            return 700;
        }

        function easeInOutSine(t) {
            return -(Math.cos(Math.PI * THREE.MathUtils.clamp(t, 0, 1)) - 1) / 2;
        }

        function getThresholdBlend(value, start, full) {
            if (full <= start) return value >= full ? 1 : 0;
            return easeInOutSine(THREE.MathUtils.clamp((value - start) / (full - start), 0, 1));
        }

        function getAutoViewFrame(progress) {
            const autoView = SYSTEM_CONFIG.model.autoView;
            const shots = autoView && autoView.shots ? autoView.shots : [];
            if (!shots.length) {
                return {
                    camera: SYSTEM_CONFIG.model.startCamera,
                    target: SYSTEM_CONFIG.model.startTarget,
                    yaw: 0,
                    pitch: 0
                };
            }

            const p = THREE.MathUtils.clamp(progress, 0, 1);
            let from = shots[0];
            let to = shots[shots.length - 1];
            for (let i = 0; i < shots.length - 1; i++) {
                if (p >= shots[i].progress && p <= shots[i + 1].progress) {
                    from = shots[i];
                    to = shots[i + 1];
                    break;
                }
            }

            const local = to.progress === from.progress
                ? 0
                : easeInOutSine((p - from.progress) / (to.progress - from.progress));
            return {
                camera: new THREE.Vector3().lerpVectors(from.camera, to.camera, local),
                target: new THREE.Vector3().lerpVectors(from.target, to.target, local),
                yaw: THREE.MathUtils.lerp(from.yaw || 0, to.yaw || 0, local),
                pitch: THREE.MathUtils.lerp(from.pitch || 0, to.pitch || 0, local)
            };
        }

        function getPlaybackElapsed(now) {
            if (!systemStarted || !shotStartTime) return 0;
            if (isExportMode) {

            if (!dataPlaybackStarted) return 0;
            return Math.max(0, now - shotStartTime);
        }

        function getPlaybackTimelineState(now) {
            const elapsed = getPlaybackElapsed(now);
            const intro = SYSTEM_CONFIG.export.introHoldMs;
            const dataRun = SYSTEM_CONFIG.export.dataRunMs;
            const outro = SYSTEM_CONFIG.export.outroHoldMs;
            const total = intro + dataRun + outro;
            const clamped = THREE.MathUtils.clamp(elapsed, 0, total);
            const dataElapsed = THREE.MathUtils.clamp(clamped - intro, 0, dataRun);
            return {
                elapsed: clamped,
                total,
                progress: dataRun > 0 ? dataElapsed / dataRun : 0,
                showPanel: clamped >= intro && clamped < intro + dataRun,
                inIntro: clamped < intro,
                inOutro: clamped >= intro + dataRun,
                isComplete: elapsed >= total
            };

            targetDataDistancePulse = 0;

            if (points && points.geometry && points.geometry.attributes.basePosition) {
                const positions = points.geometry.attributes.position;
                const bases = points.geometry.attributes.basePosition;
                for (let i = 0; i < positions.count; i++) {
                    positions.setXYZ(i, bases.getX(i), bases.getY(i), bases.getZ(i));
                }
                positions.needsUpdate = true;
            }

            if (points && points.material) {
                points.material.opacity = SYSTEM_CONFIG.model.pointOpacity;
                points.material.size = SYSTEM_CONFIG.model.pointSize;
            }

            if (bloomPass) bloomPass.strength = 0.45;
            if (rgbShiftPass && rgbShiftPass.uniforms && rgbShiftPass.uniforms['amount']) rgbShiftPass.uniforms['amount'].value = 0.0002;
            if (scene && scene.fog) scene.fog.density = 0.04;
        }

        function getDataIndexFromProgress(progress) {
            if (!exchangeData.length) return 0;
            return Math.min(exchangeData.length - 1, Math.floor(progress * exchangeData.length));
        }

        function getMappedAnxiety(index) {
            if (!exchangeData.length) return { anxiety: 0, deviation: 0, velocity: 0, shock: 0, movement: 0 };

            const activeData = exchangeData[index];
            const previousData = exchangeData[Math.max(0, index - 1)];
            const direction = activeData.rate - previousData.rate;
            const movement = Math.abs(direction);
            const dataVolatility = Number.isFinite(activeData.volatility)
                ? THREE.MathUtils.clamp(activeData.volatility, 0, 1)
                : null;
            const dataTrend = Number.isFinite(activeData.trend)
                ? THREE.MathUtils.clamp(activeData.trend, -1, 1)
                : null;

            const deviation = THREE.MathUtils.clamp(Math.abs(activeData.rate - BASELINE_RATE) / RATE_RANGE_FOR_DEVIATION, 0, 1);
            const velocity = dataVolatility === null
                ? THREE.MathUtils.clamp(movement / RATE_RANGE_FOR_VELOCITY, 0, 1)
                : dataVolatility;
            const shock = THREE.MathUtils.clamp((movement - SHOCK_THRESHOLD) / RATE_RANGE_FOR_VELOCITY, 0, 1);
            const trend = dataTrend === null
                ? THREE.MathUtils.clamp(direction / RATE_RANGE_FOR_VELOCITY, -1, 1)
                : dataTrend;
            const anxiety = THREE.MathUtils.clamp(
                deviation * DEVIATION_WEIGHT + velocity * VELOCITY_WEIGHT + shock * SHOCK_WEIGHT,
                0,
                1
            );

            return { anxiety, deviation, velocity, volatility: velocity, shock, movement, direction, trend };
        }

        function getDeterministicErosionMemory(progress, forcedStress = null) {
            const erasureConfig = SYSTEM_CONFIG.model.ceilingErasure;
            if (!erasureConfig || exchangeData.length < 2) return 0;

            const gate = erasureConfig.erosionGate || { enabled: false };
            const gateStart = gate.enabled ? gate.startProgress : 0;
            const gateFull = gate.enabled ? gate.fullProgress : 0;
            const gateBlend = gate.enabled ? getThresholdBlend(progress, gateStart, gateFull) : 1;
            if (gate.enabled && gateBlend <= 0) return 0;

            const segmentCount = exchangeData.length - 1;
            const segmentSeconds = (SYSTEM_CONFIG.export.dataRunMs / 1000) / segmentCount;
            const exactSegment = THREE.MathUtils.clamp(progress, 0, 1) * segmentCount;
            const gateStartSegment = THREE.MathUtils.clamp(gateStart, 0, 1) * segmentCount;
            let memory = 0;

            for (let segment = 0; segment < segmentCount; segment++) {
                const portionBeforeGate = gate.enabled ? THREE.MathUtils.clamp(gateStartSegment - segment, 0, 1) : 0;
                const portionAtProgress = THREE.MathUtils.clamp(exactSegment - segment, 0, 1);
                const portion = Math.max(0, portionAtProgress - portionBeforeGate);
                if (portion <= 0 && segment > exactSegment) break;
                if (portion <= 0) continue;

                const mapped = getMappedAnxiety(segment + 1);
                const stress = forcedStress === null ? mapped.anxiety : forcedStress;
                const risingRatePressure = THREE.MathUtils.clamp((mapped.direction || 0) / RATE_RANGE_FOR_VELOCITY, 0, 1);
                const fallingRatePressure = THREE.MathUtils.clamp(-(mapped.direction || 0) / RATE_RANGE_FOR_VELOCITY, 0, 1);
                const shockPressure = mapped.shock || 0;
                const buildRate = erasureConfig.memoryRiseRate * stress + erasureConfig.memoryShockRate * shockPressure + erasureConfig.memoryRiseRate * risingRatePressure;
                const slowRate = erasureConfig.memoryFallRate * fallingRatePressure + 0.004 * stress;
                const leak = erasureConfig.memoryLeakRate * (1 - stress) * (1 - shockPressure);
                memory = THREE.MathUtils.clamp(memory + (buildRate + slowRate - leak) * segmentSeconds * portion, 0, 1);
            }

            return THREE.MathUtils.clamp(memory * gateBlend * (gate.memoryBoost || 1), 0, 1);
        }

        const uiDate = document.getElementById('display-date');

        function createNoiseBuffer(durationSeconds, level = 1) {
            const buffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * durationSeconds), audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            let last = 0;
            for (let i = 0; i < data.length; i++) {
                last = last * 0.72 + (Math.random() * 2 - 1) * 0.28;
                data[i] = last * level;
            }
            return buffer;
        }

        function initSoundSystem() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!isAudioInitialized) {
                masterOutput = audioCtx.createGain();
                masterOutput.gain.value = SOUND_MASTER_GAIN;
                compressorNode = audioCtx.createDynamicsCompressor();
                compressorNode.threshold.value = -18;
                compressorNode.knee.value = 24;
                compressorNode.ratio.value = 7;
                compressorNode.attack.value = 0.006;
                compressorNode.release.value = 0.34;
                compressorNode.connect(masterOutput);
                masterOutput.connect(audioCtx.destination);

                oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                subOscillator = audioCtx.createOscillator();
                subOscillator.type = 'sine';

                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = 150;
                filterNode.Q.value = 0.7;
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0;
                machinePanner = audioCtx.createStereoPanner();
                machinePanner.pan.value = 0;

                subGainNode = audioCtx.createGain();
                subGainNode.gain.value = 0;
                
                oscillator.connect(filterNode);
                filterNode.connect(gainNode);
                gainNode.connect(machinePanner);
                machinePanner.connect(compressorNode);
                subOscillator.connect(subGainNode);
                subGainNode.connect(machinePanner);

                roomNoiseSource = audioCtx.createBufferSource();
                roomNoiseSource.buffer = createNoiseBuffer(2, 0.09); roomNoiseSource.loop = true;
                roomNoiseGain = audioCtx.createGain(); roomNoiseGain.gain.value = 0;
                roomFilter = audioCtx.createBiquadFilter(); roomFilter.type = 'bandpass'; roomFilter.frequency.value = 520; roomFilter.Q.value = 0.55;
                roomPanner = audioCtx.createStereoPanner(); roomPanner.pan.value = 0;
                roomNoiseSource.connect(roomFilter); roomFilter.connect(roomNoiseGain); roomNoiseGain.connect(roomPanner); roomPanner.connect(compressorNode);
                roomNoiseSource.start();

                eventNoiseSource = audioCtx.createBufferSource(); eventNoiseSource.buffer = createNoiseBuffer(1, 0.18); eventNoiseSource.loop = true;
                eventFilter = audioCtx.createBiquadFilter(); eventFilter.type = 'bandpass'; eventFilter.frequency.value = 1800; eventFilter.Q.value = 1.2;
                eventNoiseGain = audioCtx.createGain(); eventNoiseGain.gain.value = 0;

                airNoiseSource.connect(airFilter); airFilter.connect(airNoiseGain); airNoiseGain.connect(airPanner); airPanner.connect(compressorNode);
                airNoiseSource.start();
                
                oscillator.start();
                subOscillator.start();
                isAudioInitialized = true;
            }

            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            soundEnabled = true;
            nextHeartbeatTime = audioCtx.currentTime + 0.25;
            nextClickTime = audioCtx.currentTime + 0.18;

            updateLiveViewReadout();

            document.getElementById('debug-lock').addEventListener('click', () => captureCurrentView());
            document.getElementById('debug-pause').addEventListener('click', () => togglePlaybackPause());
            document.getElementById('debug-copy').addEventListener('click', () => showDebugValues());
            document.getElementById('debug-hide').addEventListener('click', () => panel.classList.remove('visible'));

            if (!systemStarted || !dataPlaybackStarted) return;
            playbackPaused = !playbackPaused;

            setExportStatus(playbackPaused ? 'DATA PLAYBACK PAUSED' : 'DATA PLAYBACK RESUMED');

        const exportStatus = document.getElementById('export-status');

        function setExportStatus(message) {

        }

        function restorePreviewViewport() {
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }

        function prepareExportViewport(width, height) {
            renderer.setPixelRatio(1);
            renderer.setSize(width, height, false);
            composer.setSize(width, height);

            camera.updateProjectionMatrix();
        }

        function resetExportTimeline() {
            virtualTime = Date.now();
            lastDayChangeTime = virtualTime;
            shotStartTime = virtualTime;
            currentAnxiety = 0;
            targetAnxiety = 0;
            deformationDrive = 0;
            targetDeformationDrive = 0;
            deformationImpulse = 0;
            cinematicDataPush = 0;
            dataDistancePulse = 0;
            targetDataDistancePulse = 0;
            previousRateForCamera = null;
            previousRateForDeformation = null;

            cameraSmoothingReady = false;

        function startSequenceExport() {
            if (!systemStarted) startSystem();

            motionPaused = false;
            updatePauseButton();
            isExportMode = true;
            exportFrameCount = 0;

            capturer = new CCapture({
                format: 'jpg',

            });

                capturer.stop();

            capturer = null;
            isExportMode = false;
            restorePreviewViewport();
            document.getElementById('ui-container').style.display = shouldDrawExportPanel() ? 'block' : 'none';
            setExportStatus('EXPORT SAVED');
            setTimeout(() => setExportStatus(''), 2200);

        function captureStillImage() {
            if (isExportMode) return;
            const exportConfig = SYSTEM_CONFIG.export;
            setExportStatus('CAPTURING STILL');
            prepareExportViewport(exportConfig.stillWidth, exportConfig.stillHeight);
            composer.render();
            composeExportFrame(true).toBlob((blob) => {
                if (!blob) {
                    restorePreviewViewport();
                    return;
                }
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${exportConfig.stillName}_${Date.now()}.png`;
                link.click();

                setExportStatus('STILL SAVED');
                setTimeout(() => setExportStatus(''), 1800);

        // Export controls: S saves one high-resolution still, K starts/stops a JPG sequence.
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            const functionKeys = new Set(['d', ' ', 'p', 'enter', 's', 'k', 'a']);
            if (!functionKeys.has(key) && systemStarted && dataPlaybackStarted) {
                enterManualCameraMode();
            }
            if (key === 'd') {
                event.preventDefault();
                document.getElementById('debug-panel')?.classList.toggle('visible');
                updateLiveViewReadout();
            }
            if (key === ' ' || key === 'p') {
                event.preventDefault();
                togglePlaybackPause();
            }
            if (key === 'enter') {
                event.preventDefault();
                enterExperience();
            }
            if (key === 'a') {
                event.preventDefault();
                DEBUG_STATE.manualCamera = false;
                setExportStatus('AUTO VIEW RESUMED');
                setTimeout(() => setExportStatus(''), 1000);
            }
            if (key === 's') {
                event.preventDefault();
                captureStillImage();
            }
            if (key === 'k') {
                event.preventDefault();
                if (!isExportMode) startSequenceExport();
                else finishSequenceExport();
            }
        });

        function triggerDataClick(volatility, trend, fadeGain) {
            if (!audioCtx || !compressorNode) return;
            const nowSec = audioCtx.currentTime;
            const clickOsc = audioCtx.createOscillator();
            const clickGain = audioCtx.createGain();
            const clickFilter = audioCtx.createBiquadFilter();
            const clickPan = audioCtx.createStereoPanner();
            const pitchDirection = trend >= 0 ? 1 : -1;
            const basePitch = trend >= 0 ? 1800 : 1350;
            const pitch = basePitch + pitchDirection * volatility * 850 + Math.random() * 160;
            clickOsc.type = 'triangle';
            clickOsc.frequency.setValueAtTime(THREE.MathUtils.clamp(pitch, 620, 3200), nowSec);
            clickFilter.type = 'bandpass';
            clickFilter.frequency.setValueAtTime(THREE.MathUtils.clamp(pitch * 1.15, 900, 4200), nowSec);
            clickFilter.Q.value = 7 + volatility * 5;
            clickPan.pan.value = THREE.MathUtils.clamp((Math.random() * 2 - 1) * (0.25 + volatility * 0.45), -0.8, 0.8);
            clickGain.gain.setValueAtTime(0.0001, nowSec);
            clickGain.gain.exponentialRampToValueAtTime((0.006 + volatility * 0.020) * fadeGain * SOUND_LAYER_GAIN, nowSec + 0.006);
            clickGain.gain.exponentialRampToValueAtTime(0.0001, nowSec + 0.035 + volatility * 0.035);
            clickOsc.connect(clickFilter);
            clickFilter.connect(clickGain);
            clickGain.connect(clickPan);
            clickPan.connect(compressorNode);
            clickOsc.start(nowSec);
            clickOsc.stop(nowSec + 0.11);
        }

        function triggerOverloadGlitch(volatility, fadeGain) {
            if (!audioCtx || !eventNoiseGain || !eventFilter) return;
            const nowSec = audioCtx.currentTime;
            const burst = (0.010 + volatility * 0.038 + Math.random() * 0.008) * fadeGain * SOUND_LAYER_GAIN;
            eventFilter.frequency.setValueAtTime(1300 + volatility * 2400 + Math.random() * 700, nowSec);
            eventFilter.Q.setValueAtTime(3.5 + volatility * 5, nowSec);
            if (eventPanner) eventPanner.pan.setValueAtTime(THREE.MathUtils.clamp((Math.random() * 2 - 1) * 0.95, -1, 1), nowSec);
            eventNoiseGain.gain.cancelScheduledValues(nowSec);
            eventNoiseGain.gain.setValueAtTime(0.0001, nowSec);
            eventNoiseGain.gain.exponentialRampToValueAtTime(burst, nowSec + 0.012);
            eventNoiseGain.gain.exponentialRampToValueAtTime(0.0001, nowSec + 0.13 + volatility * 0.08);
        }

        function updateDataDrivenSound(now, endFade) {
            if (!soundEnabled || !isAudioInitialized || !audioCtx || motionPaused || isExportMode) return;

            const fadeGain = 1 - endFade;
            const volatility = THREE.MathUtils.clamp(
                currentSoundMapping.volatility !== undefined ? currentSoundMapping.volatility : currentSoundMapping.velocity || 0,
                0,
                1
            );
            const trend = THREE.MathUtils.clamp(
                currentSoundMapping.trend !== undefined ? currentSoundMapping.trend : (currentSoundMapping.direction || 0) / RATE_RANGE_FOR_VELOCITY,
                -1,
                1
            );
            const shock = currentSoundMapping.shock || 0;
            const anxiety = currentSoundMapping.anxiety || currentAnxiety || 0;
            const nowSec = audioCtx.currentTime;
            const breathLfo = 0.5 + 0.5 * Math.sin(now * 0.00115);
            const slowPressure = 0.5 + 0.5 * Math.sin(now * 0.00031 + trend * 0.8);
            const breathIntensity = (0.010 + volatility * 0.050 + anxiety * 0.018) * (0.38 + breathLfo * 0.62) * fadeGain * SOUND_LAYER_GAIN;

            oscillator.frequency.setTargetAtTime(34 + volatility * 13 + slowPressure * 4, nowSec, 0.16);
            filterNode.frequency.setTargetAtTime(105 + volatility * 390 + Math.abs(trend) * 180, nowSec, 0.18);
            gainNode.gain.setTargetAtTime(breathIntensity, nowSec, 0.18);
            if (machinePanner) machinePanner.pan.setTargetAtTime(THREE.MathUtils.clamp(trend * 0.16 + Math.sin(now * 0.00027) * 0.08, -0.35, 0.35), nowSec, 0.25);

            const bpm = 34 + volatility * 58 + shock * 26;
            const beatInterval = 60 / bpm;
            if (nowSec >= nextHeartbeatTime && fadeGain > 0.05) {
                const pulseAmp = (0.018 + volatility * 0.050 + shock * 0.030) * fadeGain * SOUND_LAYER_GAIN;
                subOscillator.frequency.setValueAtTime(29 + volatility * 8, nowSec);
                subGainNode.gain.cancelScheduledValues(nowSec);
                subGainNode.gain.setValueAtTime(0.0001, nowSec);
                subGainNode.gain.exponentialRampToValueAtTime(pulseAmp, nowSec + 0.018);
                subGainNode.gain.exponentialRampToValueAtTime(0.0001, nowSec + 0.16 + volatility * 0.05);
                nextHeartbeatTime = nowSec + beatInterval * (0.72 + Math.random() * 0.56);
            }

            const clickDensity = 0.55 + volatility * 6.0 + shock * 2.5;
            if (nowSec >= nextClickTime && fadeGain > 0.05) {
                triggerDataClick(volatility, trend, fadeGain);
                nextClickTime = nowSec + 1 / clickDensity * (0.45 + Math.random() * 1.5);
            }

            const noiseBrightness = 420 + volatility * 1850 + Math.max(trend, 0) * 360 + shock * 1200;
            const noiseLevel = (0.012 + volatility * 0.050 + anxiety * 0.014) * fadeGain * SOUND_LAYER_GAIN;
            roomNoiseGain.gain.setTargetAtTime(noiseLevel, nowSec, 0.20);
            roomFilter.frequency.setTargetAtTime(noiseBrightness, nowSec, 0.24);
            roomFilter.Q.setTargetAtTime(0.45 + volatility * 1.8, nowSec, 0.24);
            if (roomPanner) roomPanner.pan.setTargetAtTime(THREE.MathUtils.clamp(-trend * 0.22, -0.45, 0.45), nowSec, 0.28);

            const airLevel = (0.002 + volatility * 0.020 + shock * 0.018) * fadeGain * SOUND_LAYER_GAIN;
            airNoiseGain.gain.setTargetAtTime(airLevel, nowSec, 0.14);
            airFilter.frequency.setTargetAtTime(1300 + volatility * 3200 + shock * 1800, nowSec, 0.16);
            if (airPanner) airPanner.pan.setTargetAtTime(THREE.MathUtils.clamp(trend * 0.38 + Math.sin(now * 0.00051) * 0.12, -0.7, 0.7), nowSec, 0.18);

            if ((volatility > 0.82 || shock > 0.62) && nowSec > overloadGlitchCooldown && Math.random() < 0.015 + shock * 0.045) {
                triggerOverloadGlitch(volatility, fadeGain);
                overloadGlitchCooldown = nowSec + 1.2 + Math.random() * 2.2;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const exportFrameDuration = 1000 / SYSTEM_CONFIG.export.sequenceFramerate;
            if (isExportMode) {
                virtualTime += exportFrameDuration;
            } else if (!playbackPaused) {
                virtualTime = Date.now();
            }
            const now = virtualTime;
            const dtSec = isExportMode ? (1 / SYSTEM_CONFIG.export.sequenceFramerate) : Math.min(0.05, (performance.now() - lastFrameTime) / 1000);
            lastFrameTime = performance.now();
            // ==========================================
            // 🎬 Classic orbit-controls camera relation restored
            // ==========================================
            // The older version felt better because OrbitControls handled the angle,
            // while anxiety only changed the camera distance along the same viewing line.
            // This keeps the camera-model relationship more physical and less mechanical.

            let playbackTimeline = getPlaybackTimelineState(now);
            if (!isExportMode && systemStarted && playbackTimeline.isComplete) {
                restartCycle(now);
                playbackTimeline = getPlaybackTimelineState(now);
            }
            const activeCycleProgress = playbackTimeline.progress;
            const endPullProgress = activeCycleProgress <= END_PULL_START
                ? 0
                : easeInOutSine(THREE.MathUtils.clamp((activeCycleProgress - END_PULL_START) / (LOOP_RESET_AT - END_PULL_START), 0, 1));
            const loopFadeProgress = activeCycleProgress <= LOOP_FADE_START
                ? 0
                : easeInOutSine(THREE.MathUtils.clamp((activeCycleProgress - LOOP_FADE_START) / (LOOP_RESET_AT - LOOP_FADE_START), 0, 1));
            const debugAnxiety = DEBUG_STATE.previewAnxiety >= 0 ? DEBUG_STATE.previewAnxiety : currentAnxiety;

            // Camera-model relationship restored from the simulated-data version.
            // The camera keeps orbiting around a stable target, while anxiety pushes the view closer.
            const breathDrift = Math.sin(now * 0.0005) * 0.6;
            const anxietyPush = currentAnxiety * 2.3;
            const isCeilingErasureView = SYSTEM_CONFIG.model.viewMode === 'ceilingErasure';
            const autoView = SYSTEM_CONFIG.model.autoView;
            if (isCeilingErasureView && autoView && autoView.enabled && !DEBUG_STATE.manualCamera) {
                const frame = getAutoViewFrame(activeCycleProgress);
                camera.position.copy(frame.camera);
                controls.target.copy(frame.target);
                controls.autoRotate = false;
                if (points && autoView.modelRotation) {
                    const stressYaw = Math.sin(now * 0.00045) * 0.025 * (0.25 + currentAnxiety);
                    points.rotation.y = frame.yaw + stressYaw;
                    points.rotation.x = frame.pitch;
                    points.rotation.z = Math.sin(activeCycleProgress * Math.PI * 2.0) * 0.006 * currentAnxiety;
                }
                controls.update();
            } else if (isCeilingErasureView) {
                const erasureConfig = SYSTEM_CONFIG.model.ceilingErasure;
                const overheadBlend = easeInOutSine(THREE.MathUtils.clamp((debugAnxiety - erasureConfig.overheadStartAnxiety) / (erasureConfig.overheadFullAnxiety - erasureConfig.overheadStartAnxiety), 0, 1));
                const breath = Math.sin(now * 0.00032) * 0.045;
                const orbitAngle = START_ORBIT_ANGLE - 1.05 + now * 0.000045;
                const externalCamera = new THREE.Vector3(
                    PUSH_START_TARGET.x + Math.sin(orbitAngle) * 4.75,
                    PUSH_START_CAMERA.y + breath,
                    PUSH_START_TARGET.z + Math.cos(orbitAngle) * 4.75
                );
                if (!DEBUG_STATE.manualCamera) {
                    camera.position.lerpVectors(externalCamera, SYSTEM_CONFIG.model.overheadCamera, overheadBlend);
                    controls.target.lerpVectors(PUSH_START_TARGET, SYSTEM_CONFIG.model.overheadTarget, overheadBlend);
                }
                controls.autoRotate = false;
                controls.update();
            } else {
                const targetDistance = 4.8 - anxietyPush + breathDrift;
                const offset = camera.position.clone().sub(controls.target);
                if (offset.length() > 0.1) {
                    const currentDist = offset.length();
                    const newDist = currentDist + (targetDistance - currentDist) * 0.02;
                    offset.setLength(Math.max(MIN_VIEW_DISTANCE, newDist));
                    camera.position.copy(controls.target.clone().add(offset));
                }

                controls.target.lerp(PUSH_START_TARGET, 0.035);
                controls.autoRotate = true;
                controls.autoRotateSpeed = -1.25 - (currentAnxiety * 4.0);
                controls.update();
            }

            if (systemStarted && exchangeData.length > 0) {
                const uiContainer = document.getElementById('ui-container');
                if (uiContainer && !isExportMode) {
                    uiContainer.style.display = playbackTimeline.showPanel ? 'block' : 'none';
                }

                if (!playbackPaused) {
                    const progressIndex = playbackTimeline.inIntro
                        ? 0
                        : playbackTimeline.inOutro
                            ? exchangeData.length - 1
                            : getDataIndexFromProgress(activeCycleProgress);
                    if (progressIndex !== currentDayIndex) {
                        currentDayIndex = progressIndex;
                        lastDayChangeTime = now;
                    }

                    const mappedData = getMappedAnxiety(currentDayIndex);
                    targetAnxiety = playbackTimeline.inIntro ? 0 : mappedData.anxiety;
                    currentSoundMapping = playbackTimeline.inIntro
                        ? { anxiety: 0, deviation: 0, velocity: 0, shock: 0, movement: 0, direction: 0 }
                        : mappedData;

                    // Volatility and shock add sharper pressure changes on top of the continuous anxiety field.
                    targetDataDistancePulse = THREE.MathUtils.clamp(
                        currentSoundMapping.movement * 1.45 + currentSoundMapping.velocity * 0.10 + currentSoundMapping.shock * 0.18,
                        0,
                        0.32
                    );
                    previousRateForDeformation = exchangeData[currentDayIndex].rate;

                    // Keep the real-data anxiety signal visually strong through the full cycle.
                    // The simulated-data version felt stronger because it did not damp the model before the ending.
                }

                if (playbackTimeline.inIntro) {
                    uiDate.innerText = 'SYSTEM STANDBY';
                    uiRate.innerText = '--';
                } else {
                    const displayData = exchangeData[currentDayIndex];
                    uiDate.innerText = displayData.date;
                    uiRate.innerText = "£1 = ¥" + displayData.rate.toFixed(2);
                }
            }

            if (!motionPaused) {
                currentAnxiety += (targetAnxiety - currentAnxiety) * (targetAnxiety > currentAnxiety ? 0.03 : 0.01);
            }

            const conditionLabel = getSpatialConditionLabel();
            if (conditionLabel === 'COMPROMISED') uiStress.innerHTML = `<span class="warning">COMPROMISED</span>`;
            else uiStress.innerText = conditionLabel;

            // 🚨【关键修改4】彻底删除了原有的 "camera.position.lerpVectors" 强制锁死推进代码
            // 现在摄影机的移动权力 100% 交还给了自转控制器 OrbitControls

            const glitchMax = 0.002;
            const a = Math.max(0, Math.min(1, currentAnxiety));
            let endFade = 0;
            if (systemStarted && exchangeData.length > 0) {
                // Lighter ending fade: keeps the point-cloud body present and less washed out.
                endFade = loopFadeProgress;
            }

            updateDataDrivenSound(now, endFade);

            let glitchDrive = 0;
            if (a > 0.7) { const t = (a - 0.7) / 0.3; glitchDrive = t * t; }
            const rgbAmount = glitchMax * glitchDrive;

            // Keep the final exported JPG frames visually denser and sharper.
            bloomPass.strength = 0.45 * (1 - endFade * 0.85);
            rgbShiftPass.uniforms['amount'].value = rgbAmount * (1 - endFade * 0.7);
            scene.fog.density = 0.04 + (BASE_FOG_DENSITY * 1.4 * endFade);

            if (points && points.material) {
                const recognitionHold = 1 - THREE.MathUtils.clamp(currentAnxiety / RECOGNITION_HOLD_ANXIETY, 0, 1);
                points.material.size = (SYSTEM_CONFIG.model.pointSize + recognitionHold * 0.0012) * (1 - endFade * 0.08);
                points.material.opacity = (SYSTEM_CONFIG.model.pointOpacity + recognitionHold * 0.10) * (1 - endFade * 0.22);
            }
            pointFrameSkip = (pointFrameSkip + 1) % POINT_UPDATE_INTERVAL;
            if (points && points.geometry && points.geometry.attributes.basePosition && !motionPaused && pointFrameSkip === 0) {
                const positions = points.geometry.attributes.position;
                const bases = points.geometry.attributes.basePosition;
                const count = positions.count;
                const time = now * 0.00115;
                const colors = points.geometry.attributes.color;

                // Heavy scan mode: keep the room legible. Exchange pressure now erases
                // roof and blank wall surfaces instead of stretching the whole point cloud thin.
                const visualStress = debugAnxiety;
                let finalInstability = (visualStress <= 0.55 ? (visualStress / 0.55) * 0.0065 : 0.0065 + Math.pow((visualStress - 0.55) / 0.45, 2) * 0.095) * 0.14;
                const collapseDrive = 0;
                const pressureDrive = THREE.MathUtils.clamp((visualStress - 0.22) / 0.78, 0, 1) * 0.35;
                const pressurePulse = 0.78 + 0.22 * Math.sin(time * 2.4);
                const erasureConfig = SYSTEM_CONFIG.model.ceilingErasure;
                const erosionGate = erasureConfig && erasureConfig.enabled
                    ? (erasureConfig.erosionGate || { enabled: false })
                    : null;
                const breathDrive = erasureConfig && erasureConfig.enabled && dataPlaybackStarted
                    ? getThresholdBlend(activeCycleProgress, 0, erosionGate && erosionGate.breathFullProgress !== undefined ? erosionGate.breathFullProgress : 0.08)
                    : 0;
                const structuralErosion = erosionGate && erosionGate.enabled
                    ? getThresholdBlend(
                        activeCycleProgress,
                        erosionGate.structureStartProgress !== undefined ? erosionGate.structureStartProgress : 0.70,
                        erosionGate.structureFullProgress !== undefined ? erosionGate.structureFullProgress : 1.00
                    )
                    : 0;
                const objectPhase = erosionGate && erosionGate.enabled
                    ? getThresholdBlend(
                        activeCycleProgress,
                        erosionGate.objectStartProgress !== undefined ? erosionGate.objectStartProgress : 0.24,
                        erosionGate.objectFullProgress !== undefined ? erosionGate.objectFullProgress : 0.58
                    )
                    : 0;
                const breathStress = breathDrive * (0.25 + visualStress * 0.75);
                finalInstability += breathStress * 0.016 + structuralErosion * 0.003;
                const rawCeilingErasure = erasureConfig && erasureConfig.enabled
                    ? getThresholdBlend(visualStress, erasureConfig.startAnxiety, erasureConfig.fullAnxiety)
                    : 0;
                const ceilingErasure = THREE.MathUtils.clamp(Math.max(rawCeilingErasure, structuralErosion * 0.96), 0, 1);
                const ceilingCutHeight = erasureConfig
                    ? THREE.MathUtils.lerp(erasureConfig.heightStart, erasureConfig.heightFull, ceilingErasure)
                    : Infinity;
                const rawRoomExposure = erasureConfig
                    ? getThresholdBlend(visualStress, erasureConfig.overheadStartAnxiety, erasureConfig.overheadFullAnxiety)
                    : 0;
                const roomExposure = erasureConfig
                    ? THREE.MathUtils.clamp(Math.max(rawRoomExposure, breathStress * 0.92, structuralErosion * 0.50), 0, 1)
                    : 0;
                if (erasureConfig) {
                    erosionMemory = getDeterministicErosionMemory(
                        activeCycleProgress,
                        DEBUG_STATE.previewAnxiety >= 0 ? visualStress : null
                    );
                }
                const objectErosion = erasureConfig ? THREE.MathUtils.clamp(objectPhase * 0.26 + (erosionMemory - 0.02) * 0.36 + Math.pow(visualStress, 3) * 0.07, 0, 0.56) : 0;
                const roofErosion = erasureConfig ? THREE.MathUtils.clamp(erosionMemory * 0.86 + structuralErosion * 0.58 + Math.pow(visualStress, 3) * 0.05, 0, 1) : 0;
                const wallErosion = erasureConfig ? THREE.MathUtils.clamp((erosionMemory - 0.18) * 0.58 + structuralErosion * 0.42 + Math.pow(visualStress, 3) * 0.035, 0, 1) : 0;
                const highStressWave = erasureConfig ? THREE.MathUtils.clamp((visualStress - 0.76) / 0.24, 0, 1) : 0;

                for (let i = 0; i < count; i++) {
                    const bx = bases.getX(i), by = bases.getY(i), bz = bases.getZ(i);
                    const px = positions.getX(i), py = positions.getY(i), pz = positions.getZ(i);
                    const ceilingWeight = erasureConfig
                        ? THREE.MathUtils.clamp((by - ceilingCutHeight) / 0.55, 0, 1) * ceilingErasure
                        : 0;
                    const erasureHash = 0.5 + 0.5 * Math.sin(i * 17.371 + bx * 3.7 + bz * 2.9);
                    const r = colors ? colors.getX(i) : 0.5;
                    const g = colors ? colors.getY(i) : 0.5;
                    const b = colors ? colors.getZ(i) : 0.5;
                    const brightness = (r + g + b) / 3;
                    const chroma = Math.max(r, g, b) - Math.min(r, g, b);
                    const blankSurface = erasureConfig
                        ? THREE.MathUtils.clamp((brightness - erasureConfig.blankBrightness) / 0.28, 0, 1) * THREE.MathUtils.clamp((erasureConfig.blankChroma - chroma) / erasureConfig.blankChroma, 0, 1)
                        : 0;
                    const shellWall = THREE.MathUtils.clamp((Math.abs(bx - 1.25) - 1.03) / 0.42, 0, 1) + THREE.MathUtils.clamp((Math.abs(bz) - 2.55) / 0.62, 0, 1);
                    const wallHeight = THREE.MathUtils.clamp((by - 0.45) / 0.75, 0, 1) * THREE.MathUtils.clamp((2.55 - by) / 0.70, 0, 1);
                    const blankWallWeight = THREE.MathUtils.clamp(shellWall, 0, 1) * wallHeight * blankSurface * wallErosion;
                    const interiorDetail = (1 - THREE.MathUtils.clamp(shellWall, 0, 1)) * (1 - ceilingWeight);
                    const attachmentHeight = THREE.MathUtils.clamp((by - 0.18) / 0.52, 0, 1) * THREE.MathUtils.clamp((1.82 - by) / 0.82, 0, 1);
                    const attachmentTexture = THREE.MathUtils.clamp((chroma - 0.035) / 0.22, 0, 1) * 0.55 + THREE.MathUtils.clamp((brightness - 0.22) / 0.42, 0, 1) * 0.45;
                    const attachedObjectWeight = interiorDetail * attachmentHeight * attachmentTexture;

                    const dist = Math.sqrt(bx * bx + by * by + bz * bz);
                    const edgeWeight = Math.min(1, (1.0 - Math.exp(-dist * 1.45)) * 1.35);
                    const pressureDistance = Math.sqrt(
                        Math.pow(bx - PRESSURE_ORIGIN.x, 2) +
                        Math.pow(by - PRESSURE_ORIGIN.y, 2) +
                        Math.pow(bz - PRESSURE_ORIGIN.z, 2)
                    );
                    const pressureWeight = Math.pow(THREE.MathUtils.clamp(1 - pressureDistance / PRESSURE_RADIUS, 0, 1), 1.7) * pressureDrive;

                    const fieldA = Math.sin(bx * 2.9 + time * 1.20) * Math.cos(by * 2.4 + time * 0.95);
                    const fieldB = Math.cos(bz * 2.7 - time * 1.08) * Math.sin(by * 2.1 + time * 0.84);
                    const fieldC = Math.sin((bx + bz) * 2.0 + time * 0.76);
                    const scanSlice = Math.sin((bx * 5.7) + (bz * 3.2) - time * 2.15);
                    const scanBreak = pressureWeight * pressureWeight * Math.max(0, scanSlice) * pressurePulse;

                    const radialLen = Math.max(0.0001, dist);
                    const radialX = bx / radialLen, radialY = by / radialLen, radialZ = bz / radialLen;
                    const pressureLen = Math.max(0.0001, pressureDistance);
                    const pressureX = (bx - PRESSURE_ORIGIN.x) / pressureLen;
                    const pressureY = (by - PRESSURE_ORIGIN.y) / pressureLen;
                    const pressureZ = (bz - PRESSURE_ORIGIN.z) / pressureLen;

                    const baseOutward = finalInstability * edgeWeight * 1.35;
                    const baseFlow = finalInstability * (0.55 + edgeWeight * 1.05);

                    let targetX = bx + radialX * baseOutward + fieldA * baseFlow * 0.90 + fieldC * baseFlow * 0.30;
                    let targetY = by + radialY * baseOutward * 0.50 + fieldB * baseFlow * 0.40;
                    let targetZ = bz + radialZ * baseOutward + fieldB * baseFlow * 0.74 + fieldC * baseFlow * 0.26;

                    targetX += pressureX * scanBreak * 0.22 + pressureWeight * fieldA * 0.038;
                    targetY += pressureY * scanBreak * 0.075 + pressureWeight * fieldB * 0.018;
                    targetZ += pressureZ * scanBreak * 0.18 + pressureWeight * fieldC * 0.036;

                    if (highStressWave > 0.01) {
                        const wave = Math.sin(bx * 3.4 + bz * 2.1 + time * 3.0) * Math.cos(by * 2.8 - time * 2.1);
                        const waveAmount = highStressWave * highStressWave * erasureConfig.highStressWave * (0.5 + edgeWeight * 0.7);
                        targetX += fieldA * waveAmount + pressureX * waveAmount * 0.45;
                        targetY += wave * waveAmount * 0.45;
                        targetZ += fieldB * waveAmount + pressureZ * waveAmount * 0.45;
                    }

                    const roofRegion = 0.08 + erasureHash * 0.70 + 0.10 * Math.sin(bx * 1.9 + bz * 1.2);
                    const wallRegion = 0.22 + erasureHash * 0.66 + 0.12 * Math.sin(bz * 1.6 + by * 2.1);
                    const objectRegion = 0.16 + erasureHash * 0.70 + 0.10 * Math.sin(bx * 2.6 + bz * 1.8 + by * 1.4);
                    const objectRemoval = THREE.MathUtils.clamp((objectErosion - objectRegion) / 0.30, 0, 1) * THREE.MathUtils.clamp(attachedObjectWeight * 1.15, 0, 1);
                    const roofRemoval = THREE.MathUtils.clamp((roofErosion - roofRegion) / 0.20, 0, 1) * THREE.MathUtils.clamp(ceilingWeight * 1.4, 0, 1);
                    const wallRemoval = THREE.MathUtils.clamp((wallErosion - wallRegion) / 0.22, 0, 1) * THREE.MathUtils.clamp(blankWallWeight * 1.3, 0, 1);
                    const surfaceRemoval = Math.max(objectRemoval, roofRemoval, wallRemoval);

                    if (surfaceRemoval > 0.01) {
                        const driftAmount = roofRemoval >= wallRemoval && roofRemoval >= objectRemoval
                            ? erasureConfig.ceilingDrift
                            : wallRemoval >= objectRemoval
                                ? erasureConfig.wallDrift
                                : (erosionGate && erosionGate.objectDrift !== undefined ? erosionGate.objectDrift : 3.2);
                        const drift = surfaceRemoval * surfaceRemoval * driftAmount;
                        const side = signedNoise(i * 2.11 + 301.4);
                        targetX += side * drift * 0.10 + pressureX * drift * 0.020;
                        targetY += drift * (0.95 + erasureHash * 0.55);
                        targetZ += signedNoise(i * 3.73 + 89.2) * drift * 0.10 + pressureZ * drift * 0.020;
                    } else if (roomExposure > 0.01) {
                        const roomInteriorWeight = THREE.MathUtils.clamp((1.45 - by) / 1.95, 0, 1) * (1 - ceilingWeight) * (1 - blankWallWeight);
                        const roomShift = roomExposure * erasureConfig.roomDeformBoost * roomInteriorWeight * (0.35 + edgeWeight * 0.45);
                        targetX += fieldA * roomShift * 0.70 + pressureX * roomShift * 0.25;
                        targetY += fieldB * roomShift * 0.20;
                        targetZ += fieldC * roomShift * 0.55 + pressureZ * roomShift * 0.20;
                    }

                    if (collapseDrive > 0) {
                        const isDetached = Math.abs(Math.sin(i * 91.173 + bx * 3.1 + bz * 2.7)) > (0.82 - collapseDrive * 0.34 - edgeWeight * 0.18 - pressureWeight * 0.12);
                        if (isDetached) {
                            const burst = collapseDrive * collapseDrive * (0.55 + edgeWeight * 1.35 + pressureWeight * 0.65);
                            targetX += radialX * burst * 2.2 + pressureX * burst * 0.65 + fieldA * burst * 0.8;
                            targetY += radialY * burst * 0.9 + pressureY * burst * 0.26 + fieldB * burst * 0.55;
                            targetZ += radialZ * burst * 2.0 + pressureZ * burst * 0.56 + fieldC * burst * 0.7;
                            const driftLerp = 0.085 + collapseDrive * 0.05;
                            positions.setXYZ(i, px + (targetX - px) * driftLerp, py + (targetY - py) * driftLerp, pz + (targetZ - pz) * driftLerp);
                            continue;
                        }
                    }
                    positions.setXYZ(i, px + (targetX - px) * 0.20, py + (targetY - py) * 0.20, pz + (targetZ - pz) * 0.20);
                }
                positions.needsUpdate = true;
            }

            composer.render();

            if (isExportMode && capturer) {
                capturer.capture(composeExportFrame(true));
                exportFrameCount++;
                const progress = Math.min(100, Math.round((exportFrameCount / SYSTEM_CONFIG.export.sequenceFrames) * 100));
                setExportStatus(`EXPORTING JPG SEQUENCE ${progress}%`);
                if (exportFrameCount >= SYSTEM_CONFIG.export.sequenceFrames) finishSequenceExport();
            }
        }

        window.addEventListener('resize', () => {
            if(!isExportMode) {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            }
        });
        animate();
    </script>
</body>
</html>
